version: "3.9"

services:
  # 1. Existing PostgreSQL Database
  db:
    image: postgres:15
    container_name: teamflow_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teamflow_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis Service
  redis:
    image: redis:7-alpine
    container_name: teamflow_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: 