version: "3.9"

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15
    container_name: teamflow_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teamflow_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis Service
  redis:
    image: redis:7-alpine
    container_name: teamflow_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  # 3. FastAPI Application
  app:
    build: .
    container_name: teamflow_app
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0

  # 4. Celery Worker
  worker:
    build: .
    container_name: teamflow_worker
    restart: always
    command: celery -A worker worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0

volumes:
  postgres_data:
  redis_data: